<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#110e08"/>
  <g transform="translate(16,16)">
    <!-- Tree trunk -->
    <line x1="0" y1="3" x2="0" y2="11" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Root -->
    <line x1="-3" y1="11" x2="3" y2="11" stroke="#c9a84c" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <!-- Main branches -->
    <line x1="0" y1="3" x2="-6" y2="-5" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="3" x2="6" y2="-5" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-4" y2="-7" stroke="#c9a84c" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="4" y2="-7" stroke="#c9a84c" stroke-width="1" stroke-linecap="round"/>
    <!-- Smaller branches -->
    <line x1="-6" y1="-5" x2="-9" y2="-9" stroke="#c9a84c" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="-6" y1="-5" x2="-3" y2="-10" stroke="#c9a84c" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="6" y1="-5" x2="9" y2="-9" stroke="#c9a84c" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="6" y1="-5" x2="3" y2="-10" stroke="#c9a84c" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    <!-- Leaf dots -->
    <circle cx="-9" cy="-9" r="1.2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="-3" cy="-10" r="1.2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="9" cy="-9" r="1.2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="3" cy="-10" r="1.2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="-4" cy="-7" r="1" fill="#c9a84c" opacity="0.5"/>
    <circle cx="4" cy="-7" r="1" fill="#c9a84c" opacity="0.5"/>
  </g>
</svg>
